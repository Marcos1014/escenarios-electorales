<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escenarios Electorales — San Justo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0c1117;--card:#151c25;--border:#1e2a38;--cyan:#00d4ff;--green:#00e676;--orange:#ffab00;--text:#d0dae6;--muted:#6b7b8d}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

  .top-bar{background:rgba(0,212,255,0.04);border-bottom:1px solid var(--border);padding:8px 24px;text-align:center}
  .top-bar h1{font-size:0.85rem;font-weight:700;color:var(--cyan);letter-spacing:1.5px}
  .top-bar p{font-size:0.6rem;color:var(--muted);margin-top:2px}

  .main{max-width:100vw;padding:14px 20px;overflow-y:auto;overflow-x:hidden;height:calc(100vh - 46px)}

  /* Controls bar */
  .controls{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;padding-bottom:10px;border-bottom:1px solid var(--border)}
  .controls label{font-size:0.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
  .ctrl-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
  .t-btn{padding:6px 12px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;border-radius:6px;font-size:0.75rem;font-family:inherit;transition:all .15s}
  .t-btn:hover{border-color:var(--cyan);color:var(--cyan)}
  .t-btn.active{background:rgba(0,212,255,0.08);border-color:var(--cyan);color:var(--cyan);font-weight:600}
  .t-select{background:var(--card);color:var(--orange);border:1px solid rgba(255,171,0,0.3);padding:6px 10px;border-radius:6px;
    font-size:0.75rem;font-family:inherit;cursor:pointer;max-width:220px}
  .t-select:focus{outline:none;border-color:var(--orange)}
  .esc-select{background:var(--card);color:var(--cyan);border:1px solid rgba(0,212,255,0.3);padding:6px 10px;border-radius:6px;
    font-size:0.75rem;font-family:inherit;cursor:pointer;max-width:280px}
  .esc-select:focus{outline:none;border-color:var(--cyan)}
  .t-info{font-size:0.65rem;color:var(--muted)}
  .btn-custom{padding:6px 12px;border:1px solid rgba(255,171,0,0.3);background:transparent;color:var(--orange);cursor:pointer;
    border-radius:6px;font-size:0.75rem;font-family:inherit;font-weight:600;transition:all .15s}
  .btn-custom:hover{background:rgba(255,171,0,0.06);border-color:var(--orange)}
  .btn-custom.active{background:rgba(255,171,0,0.1);border-color:var(--orange)}

  /* Cards */
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:16px;align-items:start}
  .cards.single{grid-template-columns:1fr}
  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;overflow:hidden}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
  .card.gen::before{background:linear-gradient(90deg,#1976d2,#42a5f5)}
  .card.leg::before{background:linear-gradient(90deg,var(--cyan),var(--green))}
  .card-title{font-size:0.72rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:16px}

  /* Alliance bars */
  .al{margin-bottom:10px}
  .al-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
  .al-name{font-size:0.8rem;font-weight:500}
  .al-pct{font-size:1.1rem;font-weight:800}
  .al-pct.win{color:var(--green)}
  .al-pct.lose{color:#ff5252}
  .al-bar{height:28px;background:rgba(255,255,255,0.03);border-radius:5px;overflow:hidden;display:flex;position:relative}
  .al-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:600;
    color:rgba(255,255,255,0.95);overflow:hidden;white-space:nowrap;transition:width .4s}
  .al-seg span{padding:0 4px}
  .al-mid{position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,0.12)}
  .al-50{position:absolute;left:50%;top:-11px;transform:translateX(-50%);font-size:0.5rem;color:var(--muted)}
  .al-det{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
  .al-det span{font-size:0.6rem;color:var(--muted)}
  .al-det strong{color:#b0c0d0}
  .al-minor{display:flex;gap:12px;flex-wrap:wrap;margin-top:2px;padding:4px 0}
  .al-minor span{font-size:0.62rem;color:var(--muted)}

  /* Verdict */
  .verdict{background:rgba(0,230,118,0.06);border:1px solid rgba(0,230,118,0.15);border-radius:8px;padding:12px 16px;margin-top:12px}
  .verdict .t{font-size:0.8rem;color:#a0d8b0}
  .verdict strong{color:var(--green)}

  /* Compare table */
  .cmp{margin-top:16px}
  .cmp h3{font-size:0.78rem;color:var(--cyan);margin-bottom:10px;font-weight:600}
  .cmp-wrap{max-height:50vh;overflow:auto;border:1px solid var(--border);border-radius:8px}
  table.ct{width:100%;border-collapse:collapse;font-size:0.7rem;table-layout:auto}
  table.ct th{text-align:left;padding:7px 8px;border-bottom:2px solid var(--border);color:var(--cyan);font-weight:600;position:sticky;top:0;background:var(--card)}
  table.ct td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,0.04)}
  table.ct tr{cursor:pointer;transition:background .1s}
  table.ct tr:hover td{background:rgba(0,212,255,0.04)}
  .mb{height:18px;border-radius:3px;display:flex;overflow:hidden;min-width:140px}
  .mb .ms{height:100%}
  .wt{display:inline-block;padding:2px 8px;border-radius:3px;font-size:0.63rem;font-weight:600}
  .wt.lla{background:rgba(123,79,255,0.15);color:#b090ff}
  .wt.pj{background:rgba(25,118,210,0.15);color:#64b5f6}

  /* Party colors */
  .bg-lla{background:#7b4fff}.bg-jxc{background:#ffc107}.bg-ucr{background:#e53935}.bg-pro{background:#ffc107}
  .bg-plib{background:#9c27b0}.bg-hpnp{background:#1976d2}.bg-pu{background:#1976d2}.bg-up{background:#00acc1}
  .bg-fp{background:#00897b}.bg-defcba{background:#ef6c00}.bg-fit{background:#d32f2f}.bg-otros{background:#546e7a}

  /* Builder */
  .builder{background:var(--card);border:1px solid var(--orange);border-radius:10px;padding:16px;margin-bottom:16px;position:relative;overflow:hidden}
  .builder::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--orange),#ff6d00)}
  .builder-title{font-size:0.85rem;font-weight:700;color:var(--orange);margin-bottom:4px}
  .builder-sub{font-size:0.68rem;color:var(--muted);margin-bottom:16px}
  .party-pool{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;min-height:36px;padding:10px;background:rgba(255,255,255,0.02);border:1px dashed var(--border);border-radius:8px}
  .party-chip{padding:5px 12px;border-radius:20px;font-size:0.72rem;font-weight:600;cursor:pointer;transition:all .15s;border:2px solid transparent;user-select:none}
  .party-chip:hover{transform:scale(1.05);filter:brightness(1.2)}
  .party-chip.assigned{opacity:0.3;pointer-events:none}
  .party-chip .chip-pct{font-weight:400;opacity:0.7;margin-left:3px;font-size:0.65rem}
  .alliances-area{display:flex;flex-direction:column;gap:10px}
  .alliance-group{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:8px;padding:12px;position:relative}
  .alliance-group.active{border-color:var(--orange);box-shadow:0 0 12px rgba(255,171,0,0.1)}
  .ag-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .ag-name{background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-size:0.82rem;font-weight:600;
    font-family:inherit;padding:2px 4px;width:180px}
  .ag-name:focus{outline:none;border-color:var(--orange)}
  .ag-del{background:none;border:none;color:#ff5252;cursor:pointer;font-size:0.85rem;padding:2px 6px;border-radius:4px;opacity:0.5}
  .ag-del:hover{opacity:1;background:rgba(255,82,82,0.1)}
  .ag-parties{display:flex;flex-wrap:wrap;gap:5px;min-height:30px}
  .ag-parties .party-chip{cursor:pointer}
  .ag-parties .party-chip:hover{opacity:0.7}
  .ag-placeholder{font-size:0.65rem;color:var(--muted);font-style:italic;padding:6px}
  .builder-actions{display:flex;gap:8px;margin-top:14px;align-items:center}
  .btn-add{padding:7px 16px;background:rgba(255,171,0,0.1);border:1px solid rgba(255,171,0,0.3);color:var(--orange);
    border-radius:6px;cursor:pointer;font-size:0.75rem;font-family:inherit;font-weight:600;transition:all .15s}
  .btn-add:hover{background:rgba(255,171,0,0.2);border-color:var(--orange)}
  .btn-calc{padding:7px 20px;background:linear-gradient(135deg,var(--cyan),var(--green));border:none;color:#0c1117;
    border-radius:6px;cursor:pointer;font-size:0.78rem;font-family:inherit;font-weight:700;transition:all .15s;margin-left:auto}
  .btn-calc:hover{filter:brightness(1.1);transform:scale(1.02)}
  .btn-calc:disabled{opacity:0.4;cursor:not-allowed;transform:none}
  .builder-hint{font-size:0.65rem;color:var(--muted);margin-top:10px;line-height:1.5}

  @media(max-width:900px){
    .cards{grid-template-columns:1fr}
    .main{padding:12px}
    .controls{gap:6px}
  }
  @media(max-width:600px){
    .top-bar{padding:6px 12px}
    .top-bar h1{font-size:0.72rem;letter-spacing:1px}
    .top-bar p{font-size:0.52rem}
    .main{padding:8px 10px;height:calc(100vh - 40px)}
    .controls{flex-direction:column;align-items:stretch;gap:6px;padding-bottom:8px;margin-bottom:10px}
    .controls label{font-size:0.62rem}
    .ctrl-sep{display:none}
    .t-select,.esc-select{max-width:100%;width:100%;font-size:0.72rem;padding:8px 10px}
    .t-btn{padding:5px 10px;font-size:0.7rem}
    .btn-custom{width:100%;text-align:center;padding:8px 12px}
    .cards{gap:12px}
    .card{padding:12px 10px}
    .card-title{font-size:0.65rem;margin-bottom:10px}
    .al-name{font-size:0.72rem}
    .al-pct{font-size:0.95rem}
    .al-bar{height:22px}
    .al-seg{font-size:0.5rem}
    .al-det span,.al-minor span{font-size:0.55rem}
    .verdict{padding:10px 12px}
    .verdict .t{font-size:0.72rem}
    .cmp-wrap{max-height:60vh;overflow-x:auto;-webkit-overflow-scrolling:touch}
    table.ct{font-size:0.62rem;min-width:700px}
    table.ct th,table.ct td{padding:4px 5px;white-space:nowrap}
    .mb{min-width:90px;height:14px}
    .builder{padding:12px 10px}
    .builder-title{font-size:0.78rem}
    .party-pool{padding:8px;gap:4px}
    .party-chip{padding:4px 8px;font-size:0.65rem}
    .party-chip .chip-pct{font-size:0.58rem}
    .alliance-group{padding:10px 8px}
    .ag-name{font-size:0.75rem;width:140px}
    .builder-actions{flex-wrap:wrap}
    .btn-calc{width:100%;text-align:center}
  }
</style>
</head>
<body>

<div class="top-bar">
  <h1>ESCENARIOS DE ALIANZAS — SAN JUSTO</h1>
  <p>44 localidades · 574 mesas · Datos reales Leg. 2025 + Gen. 2023 · SIRIUS Intelligence</p>
</div>

<div class="main" id="main">
  <div class="controls" id="controls"></div>
  <div id="builder-container"></div>
  <div id="cards"></div>
  <div id="lla-analysis"></div>
  <div id="compare"></div>
</div>

<script>
const PC={"LA LIBERTAD AVANZA":"bg-lla","JUNTOS POR EL CAMBIO":"bg-jxc","UCR":"bg-ucr","PRO":"bg-pro",
  "PARTIDO LIBERTARIO":"bg-plib","HACEMOS POR NUESTRO PAIS":"bg-hpnp","PROVINCIAS UNIDAS":"bg-pu",
  "UNION POR LA PATRIA":"bg-up","FUERZA PATRIA":"bg-fp","DEFENDAMOS CORDOBA":"bg-defcba","FIT":"bg-fit"};
const PS={"LA LIBERTAD AVANZA":"LLA","JUNTOS POR EL CAMBIO":"JxC","HACEMOS POR NUESTRO PAIS":"HPNP",
  "UNION POR LA PATRIA":"UP","PROVINCIAS UNIDAS":"PU","DEFENDAMOS CORDOBA":"DefCba",
  "PARTIDO LIBERTARIO":"PLi","FUERZA PATRIA":"FP","UCR":"UCR","PRO":"PRO","FIT":"FIT"};

// Main parties for Leg2025 (the ones users care about)
const MAIN_PARTIES_LEG=['LA LIBERTAD AVANZA','PROVINCIAS UNIDAS','DEFENDAMOS CORDOBA',
  'PARTIDO LIBERTARIO','FUERZA PATRIA','UCR','PRO','FIT'];

// Gen2023 parties
const GEN2023_PARTIES=['LA LIBERTAD AVANZA','HACEMOS POR NUESTRO PAIS','JUNTOS POR EL CAMBIO','UNION POR LA PATRIA','FIT'];

// Mapping: Leg2025 party → Gen2023 equivalent
const LEG_TO_GEN={
  'LA LIBERTAD AVANZA':'LA LIBERTAD AVANZA',
  'PARTIDO LIBERTARIO':'LA LIBERTAD AVANZA',
  'PROVINCIAS UNIDAS':'HACEMOS POR NUESTRO PAIS',
  'DEFENDAMOS CORDOBA':'HACEMOS POR NUESTRO PAIS',
  'UCR':'JUNTOS POR EL CAMBIO',
  'PRO':'JUNTOS POR EL CAMBIO',
  'FUERZA PATRIA':'UNION POR LA PATRIA',
  'FIT':'FIT'
};

// Party chip colors (hex for inline styles)
const CHIP_COLORS={
  'LA LIBERTAD AVANZA':'#7b4fff','PROVINCIAS UNIDAS':'#1976d2','DEFENDAMOS CORDOBA':'#ef6c00',
  'PARTIDO LIBERTARIO':'#9c27b0','FUERZA PATRIA':'#00897b','UCR':'#e53935','PRO':'#ffc107','FIT':'#d32f2f',
  'HACEMOS POR NUESTRO PAIS':'#1976d2','JUNTOS POR EL CAMBIO':'#ffc107','UNION POR LA PATRIA':'#00acc1'
};

let DATA, curEsc=0, curT='depto', locNames=[];
let customMode=false, viewingSaved=-1;
// Each alliance: {name, parties: [partyName, ...]}
let customAlliances=[];
let activeGroup=0;
let rawLeg={}, rawGen={};
// Saved custom scenarios: [{nombre, alliances: [{name, parties}]}]
let savedScenarios=JSON.parse(localStorage.getItem('savedEsc')||'[]');

async function init(){
  try{DATA=await(await fetch('escenarios_alianzas.json')).json();}
  catch(e){document.getElementById('main').innerHTML='<p style="color:red;padding:40px">Error cargando datos</p>';return;}

  locNames=Object.keys(DATA.resultados_leg2025_localidades).sort((a,b)=>
    (DATA.resultados_leg2025_localidades[b]?.electores||0)-(DATA.resultados_leg2025_localidades[a]?.electores||0));

  // Extract raw data for custom builder
  extractRawData();

  buildControls();
  render();
}

function extractRawData(){
  // Leg2025 raw: per party, per level
  rawLeg.depto=DATA.resultados_leg2025_depto;
  rawLeg.sf=DATA.resultados_leg2025_sf||{};
  rawLeg.localidades={};
  for(const[loc,d]of Object.entries(DATA.resultados_leg2025_localidades)){
    rawLeg.localidades[loc]=d.partidos||{};
  }
  // Also get SF from localidades if not top-level
  if(!DATA.resultados_leg2025_sf){
    rawLeg.sf=rawLeg.localidades['San Francisco']||{};
  }

  // Gen2023 raw: extract from escenario 0 (todos divididos = each alliance is 1 party)
  const esc0=DATA.escenarios[0];
  rawGen.depto={};rawGen.sf={};rawGen.localidades={};
  for(const[alName,alData]of Object.entries(esc0.gen2023)){
    // Each alliance in esc0 has exactly 1 party in breakdown
    const partido=alData.departamental?.breakdown?.[0]?.partido;
    if(!partido) continue;
    rawGen.depto[partido]={votos:alData.departamental.votos, pct:alData.departamental.pct};
    if(alData.san_francisco) rawGen.sf[partido]={votos:alData.san_francisco.votos, pct:alData.san_francisco.pct};
    if(alData.por_localidad){
      for(const[loc,ld]of Object.entries(alData.por_localidad)){
        if(!rawGen.localidades[loc]) rawGen.localidades[loc]={};
        rawGen.localidades[loc][partido]={votos:ld.votos, pct:ld.pct};
      }
    }
  }
}

function buildControls(){
  const c=document.getElementById('controls');
  c.innerHTML='';

  // === Escenario selector ===
  const lbl1=document.createElement('label');lbl1.textContent='Escenario:';c.appendChild(lbl1);

  const escSel=document.createElement('select');
  escSel.className='esc-select';
  DATA.escenarios.forEach((e,i)=>{
    const o=document.createElement('option');
    o.value='preset:'+i;
    o.textContent=(i+1)+'. '+e.nombre.replace(/^\d+\.\s*/,'');
    if(!customMode&&curEsc===i) o.selected=true;
    escSel.appendChild(o);
  });
  // Saved scenarios
  if(savedScenarios.length>0){
    const og=document.createElement('optgroup');og.label='Guardados';
    savedScenarios.forEach((s,i)=>{
      const o=document.createElement('option');
      o.value='saved:'+i;
      o.textContent=s.nombre;
      if(customMode&&viewingSaved===i) o.selected=true;
      og.appendChild(o);
    });
    escSel.appendChild(og);
  }
  escSel.onchange=()=>{
    const v=escSel.value;
    if(v.startsWith('preset:')){
      customMode=false;curEsc=parseInt(v.split(':')[1]);viewingSaved=-1;
    }else if(v.startsWith('saved:')){
      loadSaved(parseInt(v.split(':')[1]));return;
    }
    buildControls();render();
  };
  c.appendChild(escSel);

  // Custom button
  const cb=document.createElement('button');
  cb.className='btn-custom'+(customMode&&viewingSaved===-1?' active':'');
  cb.textContent='+ Armar';
  cb.onclick=()=>{customMode=true;viewingSaved=-1;customAlliances=[];activeGroup=0;buildControls();renderBuilder();render();};
  c.appendChild(cb);

  // Separator
  const sep=document.createElement('div');sep.className='ctrl-sep';c.appendChild(sep);

  // === Territorio selector ===
  const lbl2=document.createElement('label');lbl2.textContent='Territorio:';c.appendChild(lbl2);

  [{id:'depto',label:'Departamento'},{id:'sf',label:'San Francisco'}].forEach(x=>{
    const b=document.createElement('button');
    b.className='t-btn'+(curT===x.id?' active':'');
    b.textContent=x.label;
    b.onclick=()=>{curT=x.id;buildControls();render();};
    c.appendChild(b);
  });

  const locSel=document.createElement('select');
  locSel.className='t-select';
  const o0=document.createElement('option');
  o0.value='';o0.textContent='Localidad...';
  locSel.appendChild(o0);
  locNames.forEach(loc=>{
    const o=document.createElement('option');
    o.value='loc:'+loc;
    const ld=DATA.resultados_leg2025_localidades[loc];
    o.textContent=`${loc} (${ld?ld.electores.toLocaleString():0})`;
    if(curT==='loc:'+loc) o.selected=true;
    locSel.appendChild(o);
  });
  locSel.onchange=()=>{if(locSel.value){curT=locSel.value;}else{curT='depto';}buildControls();render();};
  c.appendChild(locSel);

  if(curT.startsWith('loc:')){
    const loc=curT.replace('loc:','');
    const ld=DATA.resultados_leg2025_localidades[loc];
    if(ld){const s=document.createElement('span');s.className='t-info';s.textContent=`${ld.electores.toLocaleString()} elect. · ${ld.mesas} mesas`;c.appendChild(s);}
    c.querySelectorAll('.t-btn').forEach(b=>b.classList.remove('active'));
  }
}

function loadSaved(i){
  const s=savedScenarios[i];
  customMode=true;
  viewingSaved=i;
  customAlliances=JSON.parse(JSON.stringify(s.alliances));
  activeGroup=0;
  buildControls();
  renderBuilder();
  render();
}

function deleteSaved(i){
  savedScenarios.splice(i,1);
  localStorage.setItem('savedEsc',JSON.stringify(savedScenarios));
  viewingSaved=-1;
  buildControls();
}

// ===== CUSTOM BUILDER =====

function getAssignedParties(){
  const set=new Set();
  customAlliances.forEach(a=>a.parties.forEach(p=>set.add(p)));
  return set;
}

function renderBuilder(){
  const bc=document.getElementById('builder-container');
  if(!customMode){bc.innerHTML='';return;}

  const assigned=getAssignedParties();
  // Use current territory's data for percentages
  let pctData=rawLeg.depto;
  if(curT==='sf') pctData=rawLeg.sf;
  else if(curT.startsWith('loc:')) pctData=rawLeg.localidades[curT.replace('loc:','')]||{};

  let poolHTML='';
  MAIN_PARTIES_LEG.forEach(p=>{
    const pct=pctData[p]?.pct||0;
    const bg=CHIP_COLORS[p]||'#546e7a';
    const cls=assigned.has(p)?'party-chip assigned':'party-chip';
    poolHTML+=`<div class="${cls}" style="background:${bg}" onclick="assignParty('${p}')">${PS[p]||p} <span class="chip-pct">${pct}%</span></div>`;
  });

  let groupsHTML='';
  customAlliances.forEach((al,i)=>{
    const isActive=i===activeGroup;
    let partiesHTML='';
    if(al.parties.length===0){
      partiesHTML='<div class="ag-placeholder">Click un partido arriba para agregarlo</div>';
    }else{
      al.parties.forEach(p=>{
        const bg=CHIP_COLORS[p]||'#546e7a';
        partiesHTML+=`<div class="party-chip" style="background:${bg}" onclick="removeParty(${i},'${p}')">${PS[p]||p}</div>`;
      });
    }
    groupsHTML+=`<div class="alliance-group${isActive?' active':''}" onclick="activeGroup=${i};renderBuilder();">
      <div class="ag-header">
        <input class="ag-name" value="${al.name}" onchange="customAlliances[${i}].name=this.value" onclick="event.stopPropagation();activeGroup=${i};renderBuilder();" placeholder="Nombre alianza...">

function addGroup(){
  const n=customAlliances.length+1;
  customAlliances.push({name:'Alianza '+n, parties:[]});
  activeGroup=customAlliances.length-1;
  renderBuilder();
}

function removeGroup(i){
  customAlliances.splice(i,1);
  if(activeGroup>=customAlliances.length) activeGroup=Math.max(0,customAlliances.length-1);
  renderBuilder();
  render();
}

function assignParty(party){
  if(customAlliances.length===0){addGroup();}
  const assigned=getAssignedParties();
  if(assigned.has(party)) return;
  customAlliances[activeGroup].parties.push(party);
  renderBuilder();
  render();
}

function removeParty(groupIdx, party){
  event.stopPropagation();
  customAlliances[groupIdx].parties=customAlliances[groupIdx].parties.filter(p=>p!==party);
  renderBuilder();
  render();
}

function computeCustomScenario(){
  // Build a virtual escenario from customAlliances
  const assigned=getAssignedParties();
  // Unassigned main parties become their own alliance
  const allGroups=[...customAlliances.map(a=>({name:a.name,parties:[...a.parties]}))];
  MAIN_PARTIES_LEG.forEach(p=>{
    if(!assigned.has(p)){
      allGroups.push({name:PS[p]||p, parties:[p]});
    }
  });

  // Compute leg2025
  const leg2025={};
  allGroups.forEach(g=>{
    leg2025[g.name]={departamental:null, san_francisco:null, por_localidad:{}};

    // Departamental
    leg2025[g.name].departamental=aggregateParties(g.parties, rawLeg.depto, sumVotosDepto('leg'));
    // SF
    leg2025[g.name].san_francisco=aggregateParties(g.parties, rawLeg.sf, sumVotosDepto('leg_sf'));
    // Per locality
    locNames.forEach(loc=>{
      const locData=rawLeg.localidades[loc]||{};
      const total=Object.values(locData).reduce((s,d)=>s+(d?.votos||0),0);
      leg2025[g.name].por_localidad[loc]=aggregateParties(g.parties, locData, total);
    });
  });

  // Compute gen2023 by auto-mapping
  const gen2023={};
  // First, figure out which gen2023 parties go into which alliance
  const genGroupMap={};// gen2023_party -> alliance_name
  allGroups.forEach(g=>{
    const genParties=new Set();
    g.parties.forEach(p=>{
      const gp=LEG_TO_GEN[p];
      if(gp) genParties.add(gp);
    });
    genParties.forEach(gp=>{
      if(!genGroupMap[gp]) genGroupMap[gp]=g.name;
    });
  });
  // Unassigned gen2023 parties
  GEN2023_PARTIES.forEach(gp=>{
    if(!genGroupMap[gp]) genGroupMap[gp]=gp;
  });

  // Group gen2023 data
  const genGroups={};// allianceName -> [gen2023_parties]
  for(const[gp,alName]of Object.entries(genGroupMap)){
    if(!genGroups[alName]) genGroups[alName]=[];
    genGroups[alName].push(gp);
  }

  for(const[alName,genParties]of Object.entries(genGroups)){
    gen2023[alName]={departamental:null, san_francisco:null, por_localidad:{}};
    const totalDepto=Object.values(rawGen.depto).reduce((s,d)=>s+(d?.votos||0),0);
    gen2023[alName].departamental=aggregateParties(genParties, rawGen.depto, totalDepto);
    const totalSF=Object.values(rawGen.sf).reduce((s,d)=>s+(d?.votos||0),0);
    gen2023[alName].san_francisco=aggregateParties(genParties, rawGen.sf, totalSF);
    locNames.forEach(loc=>{
      const locData=rawGen.localidades[loc]||{};
      const total=Object.values(locData).reduce((s,d)=>s+(d?.votos||0),0);
      gen2023[alName].por_localidad[loc]=aggregateParties(genParties, locData, total);
    });
  }

  return{nombre:'Escenario personalizado', gen2023, leg2025};
}

function aggregateParties(parties, rawData, totalVotos){
  let votos=0;
  const breakdown=[];
  parties.forEach(p=>{
    const d=rawData[p];
    if(d){
      votos+=d.votos||0;
      breakdown.push({partido:p, votos:d.votos||0, pct:d.pct||0});
    }
  });
  if(totalVotos===0) return{votos:0, pct:0, breakdown};
  const pct=Math.round(votos/totalVotos*1000)/10;
  return{votos, pct, breakdown};
}

let _cachedTotalLeg=null, _cachedTotalLegSF=null;
function sumVotosDepto(key){
  if(key==='leg'){
    if(_cachedTotalLeg===null) _cachedTotalLeg=Object.values(rawLeg.depto).reduce((s,d)=>s+(d?.votos||0),0);
    return _cachedTotalLeg;
  }
  if(key==='leg_sf'){
    if(_cachedTotalLegSF===null) _cachedTotalLegSF=Object.values(rawLeg.sf).reduce((s,d)=>s+(d?.votos||0),0);
    return _cachedTotalLegSF;
  }
  return 0;
}

function clearBuilder(){
  customAlliances=[];activeGroup=0;viewingSaved=-1;renderBuilder();render();
}

function saveScenario(){
  const hasParties=customAlliances.some(a=>a.parties.length>0);
  if(!hasParties) return;
  const nombre=prompt('Nombre del escenario:',customAlliances.map(a=>a.name).join(' vs '));
  if(!nombre) return;
  if(viewingSaved>=0){
    savedScenarios[viewingSaved]={nombre, alliances:JSON.parse(JSON.stringify(customAlliances))};
  }else{
    savedScenarios.push({nombre, alliances:JSON.parse(JSON.stringify(customAlliances))});
    viewingSaved=savedScenarios.length-1;
  }
  localStorage.setItem('savedEsc',JSON.stringify(savedScenarios));
  buildControls();
}

function getData(esc){
  let label,leg={},gen={},info='';
  if(curT==='depto'){
    label='Departamento San Justo';
    for(const[n,d]of Object.entries(esc.gen2023)) gen[n]=d.departamental;
    for(const[n,d]of Object.entries(esc.leg2025)) leg[n]=d.departamental;
  }else if(curT==='sf'){
    label='San Francisco';
    for(const[n,d]of Object.entries(esc.gen2023)) gen[n]=d.san_francisco;
    for(const[n,d]of Object.entries(esc.leg2025)) leg[n]=d.san_francisco;
  }else{
    const loc=curT.replace('loc:','');
    label=loc;
    for(const[n,d]of Object.entries(esc.gen2023)) gen[n]=d.por_localidad?.[loc]||null;
    for(const[n,d]of Object.entries(esc.leg2025)) leg[n]=d.por_localidad?.[loc]||null;
  }
  const hasGen=Object.values(gen).some(d=>d&&d.pct>0);
  return{label,leg,gen:hasGen?gen:null};
}

function buildBars(data){
  const entries=Object.entries(data).filter(([,d])=>d&&d.pct>0).sort((a,b)=>(b[1]?.pct||0)-(a[1]?.pct||0));
  const maxP=Math.max(...entries.map(([,d])=>d?.pct||0));
  const major=entries.filter(([,d])=>d.pct>=2);
  const minor=entries.filter(([,d])=>d.pct>0&&d.pct<2);
  let html='';
  major.forEach(([name,d])=>{
    const isWin=d.pct===maxP;
    let segs='';
    if(d.breakdown?.length>0) d.breakdown.forEach(b=>{
      const label=b.pct>=6?`${PS[b.partido]||b.partido.substring(0,4)} ${b.pct}%`:'';
      segs+=`<div class="al-seg ${PC[b.partido]||'bg-otros'}" style="width:${b.pct}%"><span>${label}</span></div>`;
    });
    const det=d.breakdown&&d.breakdown.length>1?d.breakdown.map(b=>`<span><strong>${PS[b.partido]||b.partido.substring(0,6)}</strong> ${b.pct}%</span>`).join(''):'';
    html+=`<div class="al"><div class="al-top"><span class="al-name">${name}</span><span class="al-pct ${isWin?'win':'lose'}">${d.pct}%</span></div>
      <div style="position:relative"><div class="al-50">50%</div><div class="al-bar">${segs}<div class="al-mid"></div></div></div>
      ${det?'<div class="al-det">'+det+'</div>':''}</div>`;
  });
  if(minor.length>0){
    const minorHTML=minor.map(([name,d])=>`<span>${name} <strong>${d.pct}%</strong></span>`).join('');
    html+=`<div class="al-minor">${minorHTML}</div>`;
  }
  return html;
}

function buildVerdict(data){
  const e=Object.entries(data).filter(([,d])=>d&&d.pct>0).sort((a,b)=>b[1].pct-a[1].pct);
  if(e.length<2) return '';
  const[w,wd]=e[0],[s]=e[1];
  const diff=(wd.pct-e[1][1].pct).toFixed(1);
  return `<div class="verdict"><span class="t"><strong>${w}</strong> ${wd.pct>=50?'gana con mayoría absoluta':'lidera'} con <strong>${wd.pct}%</strong> (+${diff}pp).${wd.pct<50?' No alcanza 50%.':''}</span></div>`;
}

function render(){
  if(customMode) renderBuilder();
  else document.getElementById('builder-container').innerHTML='';

  const esc=getEsc();
  const{label,leg,gen}=getData(esc);

  // Check if there's anything to show
  const hasLeg=Object.values(leg).some(d=>d&&d.pct>0);
  if(!hasLeg&&customMode){
    document.getElementById('cards').innerHTML='<div style="padding:20px;text-align:center;color:var(--muted);font-size:0.85rem">Agregá partidos a las alianzas y hacé click en <strong style="color:var(--orange)">Ver resultados</strong></div>';
    document.getElementById('lla-analysis').innerHTML='';
    document.getElementById('compare').innerHTML='';
    return;
  }

  let h='';
  if(gen){
    h=`<div class="cards"><div class="card gen"><div class="card-title">Generales 2023 — ${label}</div>${buildBars(gen)}</div>
      <div class="card leg"><div class="card-title">Legislativas 2025 — ${label}</div>${buildBars(leg)}${buildVerdict(leg)}</div></div>`;
  }else{
    h=`<div class="cards single"><div class="card leg"><div class="card-title">Legislativas 2025 — ${label}</div>${buildBars(leg)}${buildVerdict(leg)}</div></div>`;
  }
  document.getElementById('cards').innerHTML=h;
  document.getElementById('lla-analysis').innerHTML=buildLLAAnalysis();
  document.getElementById('compare').innerHTML=buildTable(esc);
}

    if(gob){
      const gc=GOB_COLORS[gob.fuerza]||'#546e7a';
      const gl=GOB_LABELS[gob.fuerza]||gob.fuerza;
      if(gob.fuerza==='PJ') gobStats.pj++;
      else if(gob.fuerza==='UCR') gobStats.ucr++;
      else if(gob.fuerza==='UCR>LLA') gobStats.ucr_lla++;
      else if(gob.fuerza==='UCR>PJ') gobStats.ucr_pj++;
      gobHTML=`<td title="${gob.intendente}${gob.nota?' — '+gob.nota:''}"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${gc};margin-right:5px;vertical-align:middle"></span><span style="color:${gc};font-weight:600;font-size:0.68rem">${gl}</span> <span style="color:var(--muted);font-size:0.63rem">${gob.intendente}</span></td>`;
    } else { gobStats.sin++; }

    // Elección intendente 2023
    const elec=ELEC_INT_2023[loc];
    let elecHTML='<td style="color:var(--muted);font-size:0.6rem">—</td>';
    if(elec&&elec.cands.length>0){
      const c=elec.cands;
      if(c.length===1&&c[0].fuerza==='Lista única'){
        elecHTML=`<td style="font-size:0.6rem"><span style="color:var(--muted)">Lista única</span></td>`;
      } else {
        let pills=c.map((x,i)=>{
          const col=ELEC_COLORS[x.fuerza]||'#546e7a';
          const bold=i===0?'font-weight:700;':'';
          const pctStr=x.pct?` ${x.pct}%`:'';
          return `<span style="${bold}color:${col}">${x.nombre} (${x.fuerza}${pctStr})</span>`;
        }).join('<span style="color:var(--border)"> · </span>');
        elecHTML=`<td style="font-size:0.6rem;line-height:1.4">${pills}</td>`;
      }
    }

    rows+=`<tr>
      <td><strong>${loc}</strong></td>
      <td>${(ld?.electores||0).toLocaleString()}</td>
      ${gobHTML}
      ${elecHTML}
      <td style="font-weight:700;color:${isFirst?'var(--green)':'#ff5252'}">${llaPct}%</td>
      <td style="color:${isFirst?'var(--green)':'#ff5252'}">${isFirst?'Si':'No'}</td>
      <td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${allyBg};margin-right:5px;vertical-align:middle"></span>${allyShort} (${bestPct}%)</td>
      <td style="font-weight:700;color:${combinedPct>=50?'var(--green)':'var(--text)'}">LLA+${allyShort} = ${combinedPct}%</td>
    </tr>`;
  });
  const gobSummary=`<span style="color:#1976d2">PJ ${gobStats.pj}</span> · <span style="color:#e53935">UCR ${gobStats.ucr}</span> · <span style="color:#7b4fff">UCR→LLA ${gobStats.ucr_lla}</span> · <span style="color:#ef6c00">UCR→PJ ${gobStats.ucr_pj}</span>`;
  return `<div class="cmp" style="margin-top:16px">
    <h3 style="color:var(--green)">Analisis LLA por localidad</h3>
    <p style="font-size:0.72rem;color:var(--muted);margin-bottom:4px">LLA gana sola en <strong style="color:var(--green)">${winsAlone}</strong> de ${locNames.length} localidades (Leg. 2025)</p>
    <p style="font-size:0.68rem;color:var(--muted);margin-bottom:10px">Gobierno local: ${gobSummary}</p>
    <div class="cmp-wrap"><table class="ct">
      <thead><tr><th>Localidad</th><th>Elect.</th><th>Gobierno</th><th>Intendente 2023</th><th>LLA %</th><th>1ra?</th><th>Mejor aliado</th><th>Combinado</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
    <p style="font-size:0.58rem;color:var(--muted);margin-top:6px;opacity:0.7">Intendente 2023: datos de medios locales (El Periódico SF, La Voz de San Justo, Arroyito Ciudad). Candidatos >3%. No escrutinio oficial.</p>
    </div>`;
}

function buildTable(esc){
  const alNames=Object.keys(esc.leg2025);
  const short=alNames.map(n=>n.length>16?n.substring(0,16)+'…':n);
  let hdr='<th>Localidad</th><th>Elect.</th>';
  short.forEach(n=>hdr+=`<th>${n}</th>`);
  hdr+='<th>Visual</th><th>Resultado</th>';
  let rows='',lW=0,oW=0;
  locNames.forEach(loc=>{
    const ld=DATA.resultados_leg2025_localidades[loc];
    let cells=`<td><strong>${loc}</strong></td><td>${(ld?.electores||0).toLocaleString()}</td>`;
    let maxP=0,winner='',barS='';
    alNames.forEach(an=>{
      const d=esc.leg2025[an]?.por_localidad?.[loc];
      const p=d?d.pct:0;
      cells+=`<td style="font-weight:${p>=40?'600':'400'};color:${p>=50?'var(--green)':'inherit'}">${p}%</td>`;
      if(p>maxP){maxP=p;winner=an;}
      const pp=d?.breakdown?.map(b=>b.partido)||[];
      let bg='bg-otros';for(const x of pp){if(PC[x]){bg=PC[x];break;}}
      barS+=`<div class="ms ${bg}" style="width:${p}%"></div>`;
    });
    if(winner.includes('LLA')||winner==='LLA') lW++; else oW++;
    const isLLA=winner.includes('LLA')||winner==='LLA';
    cells+=`<td><div class="mb">${barS}</div></td>`;
    cells+=`<td><span class="wt ${isLLA?'lla':'pj'}">${winner.length>20?winner.substring(0,18)+'…':winner} ${maxP}%</span></td>`;
    rows+=`<tr onclick="curT='loc:${loc.replace(/'/g,"\\'")}';buildControls();render();window.scrollTo(0,0)">${cells}</tr>`;
  });
  return `<div class="cmp"><h3>Todas las localidades — Leg. 2025 (click = ver detalle)</h3>
    <p style="font-size:0.7rem;color:var(--muted);margin-bottom:8px">LLA/alianza gana en <strong style="color:var(--green)">${lW}</strong> loc. · Oposición en <strong style="color:#ff5252">${oW}</strong></p>
    <div class="cmp-wrap"><table class="ct"><thead><tr>${hdr}</tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

init();
</script>
</body>
</html>
